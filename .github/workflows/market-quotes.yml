# scanX market-hours quotes — refreshes docs/data/quotes.json from NSE/BSE
# every ~15 minutes during IST trading hours so the boards show delayed quotes
# on GitHub Pages with NO desktop and NO broker account.
#
# Best-effort by design: if NSE blocks the runner this cycle, the previous
# quotes file simply stays live and the boards fall back to crawl prices.

name: scanX market quotes

on:
  schedule:
    - cron: "*/15 3-10 * * 1-5"    # ~08:45-15:45 IST window (UTC+5:30), Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scanx-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PYTHONIOENCODING: utf-8
      SCANX_NO_DHAN: "1"
      SCANX_QUOTES_CLOUD: "1"       # NSE blocks datacenter IPs -> real-time BSE-direct (+ Yahoo gap-fill)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --quiet --disable-pip-version-check requests curl_cffi yfinance pandas numpy

      - name: Fetch quotes
        run: python scripts/refresh_quotes.py || echo "quotes unavailable this cycle"

      - name: Commit & push
        run: |
          git config user.name  "scanx-bot"
          git config user.email "scanx@users.noreply.github.com"
          git add docs/data/quotes.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no quote changes"; exit 0
          fi
          git commit -m "quotes: $(date -u +%H:%MZ)"
          n=0
          until git push origin HEAD:main; do
            n=$((n+1)); [ "$n" -gt 3 ] && { echo "push failed after retries"; exit 1; }
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
          done
